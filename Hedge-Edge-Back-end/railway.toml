# Railway Configuration for Hedge Edge License API
# https://railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn license_api_production:app --bind 0.0.0.0:$PORT --workers 4 --worker-class uvicorn.workers.UvicornWorker --access-logfile - --error-logfile - --timeout 120"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[networking]
# Railway will auto-assign a domain, or you can configure custom domain
# customDomain = "api.hedge-edge.com"
